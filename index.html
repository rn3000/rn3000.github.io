<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleria Dinamica</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: white;
            font-family: sans-serif;
        }

        /* Contenitore Flex: permette alle immagini di crescere e riempire i buchi */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .img-container {
            flex: 1 1 calc(33.333% - 10px); /* Prova a stare su 3 colonne */
            min-width: 300px; /* Non scende sotto i 300px (diventa 2 o 1 colonna su mobile) */
            height: 300px; /* Altezza fissa per mantenere l'allineamento orizzontale */
            cursor: pointer;
            overflow: hidden;
        }

        @media (max-width: 600px) {
            .img-container {
                flex: 1 1 100%; /* Su cellulare occupa tutta la riga */
            }
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Riempie lo spazio senza deformarsi */
            display: block;
            transition: transform 0.3s ease;
        }

        .img-container:hover img {
            transform: scale(1.05);
        }

        /* Lightbox Fullscreen */
        .img-container.fullscreen img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* Nello zoom vedi tutta la foto originale */
            z-index: 9999;
            background: white;
            padding: 15px;
            box-sizing: border-box;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="gallery">
        <div class="img-container" onclick="toggleFullscreen(this)">
            <img src="Untitled.png" alt="Immagine">
        </div>

        <div class="img-container" onclick="toggleFullscreen(this)">
            <img src="Untitled 2.png" alt="Immagine">
        </div>
        
        <div class="img-container" onclick="toggleFullscreen(this)">
            <img src="aa.png" alt="Immagine">
        </div>
    </div>

    <script>
        function toggleFullscreen(element) {
            element.classList.toggle('fullscreen');
            if (element.classList.contains('fullscreen')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }
    </script>

</body>
</html>
