<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: white;
            font-family: sans-serif;
        }

        /* Griglia Flex: gestisce le righe e le colonne */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px; /* Spazio tra le immagini */
            max-width: 1200px;
            margin: 0 auto;
            align-items: flex-start; /* Allinea le immagini in cima alla riga */
        }

        .img-container {
            /* Calcolo per 2 colonne precise (50% meno metà del gap) */
            flex: 0 0 calc(50% - 7.5px); 
            cursor: pointer;
            overflow: hidden;
            background-color: transparent; /* Rimosso sfondo grigio */
            box-sizing: border-box;
        }

        /* Su mobile, passa a 1 colonna */
        @media (max-width: 768px) {
            .img-container {
                flex: 0 0 100%;
            }
        }

        .img-container img {
            width: 100%;
            height: auto; /* IMPORTANTE: Mantiene le proporzioni originali (niente crop) */
            display: block;
            transition: opacity 0.3s ease;
            border-radius: 4px; /* Opzionale: angoli leggermente arrotondati */
        }

        .img-container:hover img {
            opacity: 0.8;
        }

        /* --- Stile Ingrandimento (Fullscreen) --- */
        .img-container.active img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* Mostra l'immagine intera nello zoom */
            z-index: 9999;
            background: white;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 0; /* Rimuove arrotondamento nello zoom */
        }
    </style>
</head>
<body>

    <div class="gallery">
        <div class="img-container" onclick="toggleImage(this)">
            <img src="Untitled.png" alt="Foto 1">
        </div>

        <div class="img-container" onclick="toggleImage(this)">
            <img src="Untitled 2.png" alt="Foto 2">
        </div>
        
        <div class="img-container" onclick="toggleImage(this)">
            <img src="aa.png" alt="Foto 3">
        </div>
        
        </div>

    <script>
        function toggleImage(el) {
            // Aggiunge/rimuove la classe 'active' per lo zoom
            el.classList.toggle('active');
            
            // Blocca lo scroll della pagina quando l'immagine è aperta
            if (el.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }
    </script>

</body>
</html>
