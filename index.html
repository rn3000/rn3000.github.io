<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: white;
            font-family: sans-serif;
        }

        /* Layout a colonne (Masonry) per evitare buchi bianchi */
        .gallery {
            column-count: 2;
            column-gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Mobile: 1 sola colonna */
        @media (max-width: 600px) {
            .gallery { column-count: 1; }
        }

        .img-container {
            display: block;
            width: 100%;
            margin-bottom: 15px;
            break-inside: avoid;
            cursor: pointer;
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            /* Rimosse le proprietà di transizione e opacità qui */
        }

        /* Rimosso completamente l'effetto hover (overlay/opacità) */

        /* Fullscreen Zoom */
        .img-container.active img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            z-index: 9999;
            background: white;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 0;
        }
    </style>
</head>
<body>

    <div class="gallery">
        
        <div class="img-container" onclick="toggleImage(this)">
            <img src="/img/truck1-b.png">
        </div>

        </div>

    <script>
        function toggleImage(el) {
            el.classList.toggle('active');
            if (el.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }
    </script>

</body>
</html>
