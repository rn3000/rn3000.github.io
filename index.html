<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: white;
            font-family: sans-serif;
        }

        /* Il segreto: usare le colonne invece delle righe */
        .gallery {
            column-count: 2; /* Forza 2 colonne */
            column-gap: 15px; /* Spazio orizzontale tra colonne */
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Su mobile passa a 1 colonna */
        @media (max-width: 600px) {
            .gallery { column-count: 1; }
        }

        .img-container {
            display: block;
            width: 100%;
            margin-bottom: 15px; /* Spazio verticale tra le immagini */
            break-inside: avoid; /* Impedisce all'immagine di rompersi tra due colonne */
            cursor: pointer;
        }

        .img-container img {
            width: 100%;
            height: auto; /* Nessun taglio, mantiene le proporzioni */
            display: block;
            border-radius: 4px;
            transition: opacity 0.3s ease;
        }

        .img-container:hover img {
            opacity: 0.8;
        }

        /* Fullscreen Zoom */
        .img-container.active img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            z-index: 9999;
            background: white;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 0;
        }
    </style>
</head>
<body>

    <div class="gallery">
        
        <div class="img-container" onclick="toggleImage(this)">
            <img src="/img/weapon1.png" alt="Foto 1">
        </div>

        
    </div>

    <script>
        function toggleImage(el) {
            el.classList.toggle('active');
            if (el.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }
    </script>

</body>
</html>
