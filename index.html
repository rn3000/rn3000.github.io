<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: white;
        }

        .gallery {
            display: grid;
            /* Griglia automatica: prova a metterne 3, ma si adatta se lo schermo è piccolo */
            grid-template-columns: repeat(auto-fit, minmax(30%, 1fr));
            gap: 10px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .img-container {
            position: relative;
            cursor: pointer;
            outline: none;
            aspect-ratio: 1 / 1; /* Rende le miniature quadrate e ordinate */
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Effetto click per ingrandire */
        .img-container:focus img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            z-index: 9999;
            background: white;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Nasconde la barra di scorrimento quando l'immagine è aperta (opzionale) */
        .img-container:focus {
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div class="gallery">
        <div class="img-container" tabindex="0">
            <img src="Untitled 2.png" alt="Foto">
        </div>
        
        <div class="img-container" tabindex="0">
            <img src="Untitled.png" alt="Foto">
        </div>

        <div class="img-container" tabindex="0">
            <img src="aa.png" alt="Foto">
        </div>
        </div>

</body>
</html>
