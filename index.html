<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleria</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: white;
            font-family: sans-serif;
        }

        /* Layout Masonry (adattivo) */
        .gallery {
            column-count: 3;
            column-gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 900px) { .gallery { column-count: 2; } }
        @media (max-width: 600px) { .gallery { column-count: 1; } }

        .img-container {
            display: inline-block;
            width: 100%;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            transition: transform 0.2s ease;
        }

        .img-container:hover img {
            transform: scale(1.02);
        }

        /* Stile per l'immagine ingrandita */
        .img-container.fullscreen img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            z-index: 9999;
            background: white;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 0;
            transform: none; /* Rimuove lo scale dell'hover */
        }
    </style>
</head>
<body>

    <div class="gallery">
        <div class="img-container" onclick="toggleFullscreen(this)">
            <img src="Untitled.png" alt="Immagine">
        </div>

        <div class="img-container" onclick="toggleFullscreen(this)">
            <img src="Untitled 2.png" alt="Immagine">
        </div>
        
        <div class="img-container" onclick="toggleFullscreen(this)">
            <img src="aa.png" alt="Immagine">
        </div>
    </div>

    <script>
        function toggleFullscreen(element) {
            // Aggiunge o rimuove la classe 'fullscreen' al click
            element.classList.toggle('fullscreen');
            
            // Impedisce lo scroll della pagina quando l'immagine è aperta
            if (element.classList.contains('fullscreen')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }
    </script>

</body>
</html>
