<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset e Stile Generale */
        body {
            margin: 0;
            padding: 20px;
            background-color: white;
            font-family: sans-serif;
        }

        /* La Griglia Responsiva */
        .gallery {
            display: grid;
            /* Crea colonne che si adattano: minimo 250px, massimo 1 frazione di spazio */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Contenitore Immagine */
        .img-container {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            background: #f9f9f9;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Mantiene le proporzioni tagliando l'eccesso */
            display: block;
            transition: transform 0.3s ease;
        }

        /* Effetto Ingrandimento (Lightbox "fai-da-te") */
        /* Quando l'utente clicca, usiamo il focus per simulare l'apertura */
        .img-container:focus {
            outline: none;
        }

        .img-container:focus img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            box-sizing: border-box;
        }

        /* Testo di aiuto */
        .info {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="gallery">
        <div class="img-container" tabindex="0">
            <img src="https://picsum.photos/600/800" alt="Descrizione">
        </div>
        
        <div class="img-container" tabindex="0">
            <img src="https://picsum.photos/800/600" alt="Descrizione">
        </div>

        <div class="img-container" tabindex="0">
            <img src="https://picsum.photos/700/700" alt="Descrizione">
        </div>
        </div>

</body>
</html>
