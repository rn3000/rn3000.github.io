<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: white;
            font-family: sans-serif;
        }

        /* Griglia a 2 colonne fisse su desktop, 1 su mobile */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .img-container {
            /* Calcolo per 2 colonne (50% meno il gap) */
            flex: 1 1 calc(50% - 15px); 
            height: 400px; /* Altezza fissa per un look ordinato in griglia */
            cursor: pointer;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        /* Su schermi piccoli (mobile), passa a 1 colonna */
        @media (max-width: 768px) {
            .img-container {
                flex: 1 1 100%;
                height: 300px;
            }
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Riempie il riquadro senza deformarsi */
            display: block;
            transition: opacity 0.3s ease;
        }

        .img-container:hover img {
            opacity: 0.8;
        }

        /* Stile Ingrandimento (Fullscreen) */
        .img-container.active img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* Mostra l'immagine intera senza tagliarla */
            z-index: 9999;
            background: white;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="gallery">
        <div class="img-container" onclick="toggleImage(this)">
            <img src="Untitled.png" alt="Foto 1">
        </div>

        <div class="img-container" onclick="toggleImage(this)">
            <img src="Untitled 2.png" alt="Foto 2">
        </div>
        
        <div class="img-container" onclick="toggleImage(this)">
            <img src="aa.png" alt="Foto 3">
        </div>
    </div>

    <script>
        function toggleImage(el) {
            // Aggiunge/rimuove la classe 'active' per lo zoom
            el.classList.toggle('active');
            
            // Blocca lo scroll della pagina quando l'immagine è aperta
            if (el.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }
    </script>

</body>
</html>
